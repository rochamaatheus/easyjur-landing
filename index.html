<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyJur Legal Operations — Peças jurídicas com prazo travado em contrato</title>

      name="description"
      content="Petições, audiências e diligências entregues em 3 a 4 dias por uma rede de advogados ranqueada por desempenho. Prazo travado em contrato, por até 80% menos que produzir internamente."
    />
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('theme')
          if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
